name: CI — Lint, Test, Build & Integration

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  API_KEY: test-secret-key

jobs:
  # ─── Job 1: Lint ──────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Run flake8
        run: make lint

  # ─── Job 2: Unit Tests ────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Run unit tests with coverage
        run: make test

  # ─── Job 3: Docker Build + Integration Tests ──────────────────────────────
  build-and-integration:
    name: Docker Build & Integration Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: make install

      - name: Build Docker images (no push)
        run: make build

      - name: Run integration tests against Docker container
        run: make integration-test
